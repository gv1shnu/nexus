<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Metasearch</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="cosmos">
        <div class="sun"></div>
        <div class="orbit orbit-1">
            <div class="star"></div>
        </div>
        <div class="orbit orbit-2">
            <div class="star"></div>
        </div>
        <div class="orbit orbit-3">
            <div class="star"></div>
        </div>
        <div class="orbit orbit-4">
            <div class="star"></div>
        </div>
        <div class="orbit orbit-5">
            <div class="star"></div>
        </div>
    </div>

    <button id="homeBtn" class="home-icon" onclick="goHome()" title="Home" aria-label="Home" style="display: none;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 10.5 12 3l9 7.5" />
            <path d="M5 10v10h14V10" />
        </svg>
    </button>

    <div class="container">
        <h1>Nexus</h1>

        <div class="search-bar">
            <input id="searchInput" placeholder="Search the internet..." />
            <button id="sortBtn" onclick="toggleSort()" style="display: none;">Date</button>
        </div>

        <div id="status"></div>
        <div id="loader" class="loader hidden"></div>

        <div id="tabs" class="tabs hidden">
            <button class="tab active" data-tab="all">All</button>
            <button class="tab" data-tab="web">Web</button>
            <button class="tab" data-tab="images">Images</button>
            <button class="tab" data-tab="videos">Videos</button>
            <button class="tab" data-tab="news">News</button>
            <button class="tab" data-tab="documents">Docs</button>
            <button class="tab" data-tab="books">Books</button>
            <button class="tab" data-tab="code">Code</button>
            <button class="tab" data-tab="academic">Academic</button>
            <button class="tab" data-tab="reference">Wikipedia</button>
            <button class="tab" data-tab="community">Community</button>
            <button class="tab" data-tab="osint">OSINT</button>
            <button class="tab" data-tab="nsfw">NSFW</button>
        </div>

        <div id="results"></div>
        <div id="pagination" class="pagination"></div>

        <footer>
            <p>the goal is more information, not speed.</p>
            <p><a href="/stats.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.8rem;">stats &rarr;</a></p>
        </footer>
    </div>

    <script src="index.js"></script>
</body>

</html>
